# Equity Research Platform — Configuration
# All values can be overridden by environment variables prefixed with ER_

platform:
  name: "Equity Intelligence Research"
  tagline: "Institutional-Grade Independent Research"
  version: "1.0.0"

llm:
  provider: "auto"          # auto | openai | anthropic | groq | gemini | together | openrouter | ollama
  temperature: 0.1
  max_tokens: 4096
  timeout: 300
  max_retries: 3

modeling:
  min_history_years: 5
  forecast_years: 5
  terminal_growth_rate_default: 3.0
  wacc_floor_pct: 6.0
  wacc_ceiling_pct: 20.0
  peer_group_size: 5

report:
  min_word_count: 15000
  target_word_count: 25000
  firm_name: "Equity Intelligence Research"
  heading_font: "Calibri"
  body_font: "Calibri"
  primary_color: "#1a237e"
  accent_color: "#b71c1c"

acquisition:
  years_history: 7
  rate_limit_rps: 0.5
  download_timeout_sec: 60
  playwright_headless: true

forensics:
  beneish_manipulation_threshold: -1.78
  beneish_high_risk_threshold: -1.0
  altman_em_safe: 2.60
  altman_em_distress: 1.10
  piotroski_strong: 7
  piotroski_weak: 2
  accrual_ratio_high: 0.10

logging:
  level: "INFO"
  rotation: "50 MB"
  retention: "30 days"
